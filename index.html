<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Math Line</title>
	<style>
		:root {
			--bg1: #000000;
			--bg2: #050505;
			--bg3: #0a0a0f;
			--bg4: #0d001a;
			--accent: #9d4edd;
			--text-color: #ffffff;
			--card-radius: 14px;
		}

		html,
		body {
			margin: 0;
			padding: 0;
			height: 100%;
			font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
			color: var(--text-color);
			background: #000;
			overflow-x: hidden;
			position: relative;
		}

		/* Animated Grid Background */
		#grid-bg {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: 1;
			pointer-events: none;
		}

		/* Auth Modal */
		#auth-modal {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.9);
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 25;
		}

		#auth-modal.hidden {
			display: none;
		}

		.auth-container {
			background: rgba(15, 0, 30, 0.95);
			padding: 40px;
			border-radius: 12px;
			border: 2px solid #c77dff;
			max-width: 400px;
			width: 90%;
			box-shadow: 0 0 30px #9d4edd;
		}

		.auth-container h1 {
			color: #00f5ff;
			text-align: center;
			margin-bottom: 30px;
		}

		.auth-input {
			width: 100%;
			padding: 12px;
			margin: 12px 0;
			background: rgba(50, 50, 70, 0.8);
			border: 2px solid rgba(157, 78, 221, 0.3);
			border-radius: 6px;
			color: var(--text-color);
			font-size: 14px;
			box-sizing: border-box;
			transition: all 0.3s;
		}

		.auth-input:focus {
			outline: none;
			border-color: #9d4edd;
			background: rgba(50, 50, 70, 1);
			box-shadow: 0 0 10px rgba(157, 78, 221, 0.3);
		}

		.auth-button {
			width: 100%;
			padding: 12px;
			margin: 12px 0;
			background: #9d4edd;
			border: none;
			border-radius: 6px;
			color: #fff;
			font-weight: 700;
			cursor: pointer;
			transition: all 0.3s;
		}

		.auth-button:hover {
			background: #c77dff;
			box-shadow: 0 0 15px rgba(157, 78, 221, 0.5);
		}

		.auth-toggle {
			text-align: center;
			margin-top: 15px;
			color: #9d4edd;
			cursor: pointer;
			font-size: 12px;
		}

		.auth-error {
			color: #ff6b6b;
			text-align: center;
			margin: 10px 0;
			font-size: 12px;
		}

		.auth-success {
			color: #51cf66;
			text-align: center;
			margin: 10px 0;
			font-size: 12px;
		}

		/* User Panel */
		#user-panel {
			position: fixed;
			top: 10px;
			right: 10px;
			background: rgba(157, 78, 221, 0.2);
			border: 2px solid #9d4edd;
			border-radius: 8px;
			padding: 12px 16px;
			z-index: 20;
			font-size: 12px;
		}

		#user-panel button {
			background: #9d4edd;
			border: none;
			color: #fff;
			padding: 6px 12px;
			border-radius: 4px;
			cursor: pointer;
			margin-left: 10px;
			font-weight: 700;
			transition: all 0.3s;
		}

		#user-panel button:hover {
			background: #c77dff;
		}

		/* Leaderboard */
		#leaderboard-modal {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.8);
			display: none;
			align-items: center;
			justify-content: center;
			z-index: 22;
			backdrop-filter: blur(4px);
		}

		#leaderboard-modal.show {
			display: flex;
		}

		.leaderboard-container {
			background: rgba(15, 0, 30, 0.95);
			padding: 30px;
			border-radius: 12px;
			border: 2px solid #c77dff;
			max-width: 600px;
			width: 90%;
			max-height: 80vh;
			overflow-y: auto;
			box-shadow: 0 0 30px #9d4edd;
		}

		.leaderboard-container h2 {
			color: #00f5ff;
			text-align: center;
			margin-top: 0;
		}

		.leaderboard-row {
			display: grid;
			grid-template-columns: 50px 1fr 150px;
			align-items: center;
			padding: 12px;
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
			gap: 15px;
		}

		.leaderboard-row.header {
			background: rgba(157, 78, 221, 0.2);
			font-weight: 700;
			border-bottom: 2px solid #9d4edd;
		}

		.leaderboard-rank {
			text-align: center;
			color: #9d4edd;
			font-weight: 700;
		}

		.leaderboard-rank.first {
			color: #ffd700;
		}

		.leaderboard-rank.second {
			color: #c0c0c0;
		}

		.leaderboard-rank.third {
			color: #cd7f32;
		}

		.leaderboard-name {
			color: #00f5ff;
		}

		.leaderboard-playtime {
			text-align: right;
			color: #c77dff;
		}

		.close-leaderboard {
			background: rgba(255, 255, 255, 0.1) !important;
			margin-top: 15px;
			width: 100%;
		}

		/* Secret Box */
		#secret-box {
			position: fixed;
			top: 70px;
			right: 10px;
			width: 80px;
			height: 50px;
			z-index: 20;
			cursor: pointer;
			background: rgba(0, 0, 0, 0.1);
			border: 2px solid transparent;
			border-radius: 8px;
			transition: all 0.3s ease;
		}

		#secret-box:hover {
			background: rgba(157, 78, 221, 0.3);
			border-color: #9d4edd;
			box-shadow: 0 0 15px rgba(157, 78, 221, 0.5);
		}

		/* Header */
		header {
			padding: 20px;
			text-align: center;
			position: relative;
			z-index: 5;
		}

		header h1 {
			margin: 0;
			font-size: 2.6rem;
			color: #00f5ff;
			text-shadow: 0 0 10px #00f5ff, 0 0 25px #00f5ff;
		}

		/* Top search & categories */
		.top-controls {
			display: flex;
			justify-content: center;
			padding: 0 12px;
			z-index: 5;
			flex-wrap: wrap;
			gap: 10px;
			position: relative;
		}

		#search-input {
			background: rgba(20, 77, 20, 0.6);
			color: var(--text-color);
			width: 100%;
			max-width: 520px;
			padding: 8px 12px;
			font-size: 15px;
			border-radius: 8px;
			border: 2px solid rgba(255, 255, 255, 0.06);
			outline: none;
			box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
		}

		.category-bar {
			text-align: center;
			margin: 6px 0 12px;
			z-index: 5;
			display: flex;
			justify-content: center;
			flex-wrap: wrap;
			padding: 0 12px;
			gap: 8px;
			position: relative;
		}

		.category-bar button {
			margin: 4px 6px;
			padding: 6px 12px;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			background: var(--accent);
			color: #fff;
			font-weight: 700;
			transition: transform .12s, filter .12s;
		}

		.category-bar button:hover {
			filter: brightness(1.05);
			transform: translateY(-2px);
		}

		.category-bar button.active {
			outline: 3px solid rgba(255, 255, 255, 0.06);
			background: #ff00ff;
		}

		.game-counter {
			text-align: center;
			color: var(--accent);
			margin: 8px 0;
			font-size: 14px;
			font-weight: 700;
			position: relative;
			z-index: 5;
		}

		#game-list {
			display: grid;
			grid-template-columns: repeat(6, minmax(100px, 1fr));
			gap: 10px;
			padding: 18px;
			position: relative;
			z-index: 5;
		}

		.game-card {
			width: 100%;
			aspect-ratio: 1/1;
			display: flex;
			align-items: center;
			justify-content: center;
			flex-direction: column;
			background: rgba(15, 0, 30, 0.85);
			border-radius: var(--card-radius);
			cursor: pointer;
			font-weight: 800;
			text-align: center;
			padding: 6px;
			user-select: none;
			border: 2px solid #c77dff;
			color: #c77dff;
			box-shadow: 0 0 10px #c77dff, 0 0 20px #9d4edd, 0 0 40px #7b2cbf;
			transition: all 0.3s ease;
			position: relative;
		}

		.game-card:hover {
			color: #ffffff;
			border-color: #ff00ff;
			box-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff, 0 0 60px #ff00ff;
			transform: translateY(-4px) scale(1.02);
		}

		.game-card.request {
			box-shadow: 0 0 20px 4px var(--accent);
		}

		#game-frame {
			display: none;
			width: 95%;
			max-width: 1200px;
			height: 680px;
			margin: 12px auto;
			border: none;
			border-radius: 12px;
			background: #000;
			position: relative;
			z-index: 6;
			box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
		}

		#game-loading {
			display: none;
			text-align: center;
			padding: 20px;
			color: var(--accent);
			z-index: 6;
			position: relative;
		}

		.spinner {
			border: 4px solid rgba(157, 78, 221, 0.3);
			border-top: 4px solid #9d4edd;
			border-radius: 50%;
			width: 40px;
			height: 40px;
			animation: spin 1s linear infinite;
			margin: 0 auto 10px;
		}

		@keyframes spin {
			0% {
				transform: rotate(0deg);
			}

			100% {
				transform: rotate(360deg);
			}
		}

		.floating-btn {
			position: fixed;
			padding: 8px 12px;
			border-radius: 8px;
			border: none;
			cursor: pointer;
			z-index: 12;
			font-weight: 700;
			box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
		}

		#fullscreen-btn {
			right: 18px;
			top: 18px;
			background: var(--accent);
			color: #fff;
			display: none;
		}

		#back-btn {
			left: 18px;
			top: 18px;
			background: rgba(0, 0, 0, 0.55);
			color: #fff;
			display: none;
		}

		.modal {
			display: none;
			position: fixed;
			z-index: 15;
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			background-color: rgba(0, 0, 0, 0.8);
			backdrop-filter: blur(4px);
		}

		.modal.active {
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.modal-content {
			background: rgba(15, 0, 30, 0.95);
			padding: 30px;
			border-radius: 12px;
			border: 2px solid #c77dff;
			max-width: 500px;
			width: 90%;
			color: var(--text-color);
			box-shadow: 0 0 30px #9d4edd;
		}

		.modal-content h2 {
			margin-top: 0;
			color: #00f5ff;
		}

		.game-stat {
			display: flex;
			justify-content: space-between;
			padding: 8px 0;
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
		}

		.game-stat label {
			color: var(--accent);
			font-weight: 700;
		}

		.modal-buttons {
			display: flex;
			gap: 10px;
			margin-top: 20px;
			justify-content: center;
		}

		.modal-buttons button {
			padding: 8px 16px;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			font-weight: 700;
			transition: all 0.2s;
		}

		.play-btn {
			background: var(--accent);
			color: #fff;
		}

		.play-btn:hover {
			filter: brightness(1.1);
		}

		.close-modal {
			background: rgba(255, 255, 255, 0.1);
			color: var(--text-color);
		}

		.close-modal:hover {
			background: rgba(255, 255, 255, 0.2);
		}

		@media (max-width:720px) {
			header h1 {
				font-size: 2rem;
			}

			#game-list {
				grid-template-columns: repeat(3, 1fr);
				gap: 8px;
			}

			#game-frame {
				height: 480px;
			}

			.category-bar {
				gap: 4px;
				display: none;
			}

			.category-bar.mobile-visible {
				display: flex;
			}

			.category-bar button {
				margin: 2px 3px;
				padding: 4px 8px;
				font-size: 12px;
			}

			.modal-content {
				max-width: 90%;
			}

			#user-panel {
				font-size: 10px;
				padding: 8px 10px;
			}

			#user-panel button {
				padding: 4px 8px;
				margin-left: 5px;
			}
		}
	</style>
</head>

<body>
	<!-- Animated Grid Background Canvas -->
	<canvas id="grid-bg"></canvas>

	<!-- Auth Modal -->
	<div id="auth-modal">
		<div class="auth-container">
			<h1 id="auth-title">Login</h1>
			<div id="auth-message"></div>
			<input type="text" id="auth-username" class="auth-input" placeholder="Username" maxlength="20">
			<input type="password" id="auth-password" class="auth-input" placeholder="Password" maxlength="30">
			<button class="auth-button" id="auth-submit">Login</button>
			<div class="auth-toggle" id="auth-toggle">Don't have an account? Create one</div>
		</div>
	</div>

	<!-- User Panel -->
	<div id="user-panel" style="display: none;">
		<span id="user-display"></span>
		<button id="leaderboard-btn">🏆 Leaderboard</button>
		<button id="logout-btn">Logout</button>
	</div>

	<!-- Secret Box -->
	<div id="secret-box"></div>

	<!-- Leaderboard Modal -->
	<div id="leaderboard-modal">
		<div class="leaderboard-container">
			<h2>🏆 Leaderboard</h2>
			<div class="leaderboard-row header">
				<div class="leaderboard-rank">Rank</div>
				<div class="leaderboard-name">Player</div>
				<div class="leaderboard-playtime">Total Playtime</div>
			</div>
			<div id="leaderboard-list"></div>
			<button class="auth-button close-leaderboard" id="close-leaderboard">Close</button>
		</div>
	</div>

	<header>
		<h1>Math Line</h1>
	</header>

	<div class="top-controls">
		<input id="search-input" type="search" placeholder="Search games" aria-label="Search games">
	</div>

		<div class="category-bar" id="category-filter"></div>
		<button id="category-toggle-mobile" style="display:none; background: var(--accent); color: #fff; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: 700; margin: 0 12px;">📂 Categories</button>

		<div class="game-counter" id="game-counter"></div>

		<div id="game-list" aria-live="polite">
			<div class="empty-state" id="empty-state"></div>
		</div>

		<div id="game-loading">
			<div class="spinner"></div>
			<p>Loading game...</p>
		</div>

		<iframe id="game-frame" title="Game frame" sandbox="allow-scripts allow-same-origin"></iframe>

		<button id="fullscreen-btn" class="floating-btn" title="Enter fullscreen (F)">Fullscreen</button>
		<button id="back-btn" class="floating-btn" title="Back to games (Esc)">← Back</button>

		<!-- Game Details Modal -->
		<div id="game-modal" class="modal">
			<div class="modal-content">
				<h2 id="modal-game-name"></h2>
				<div class="game-stat">
					<label>Category:</label>
					<span id="modal-category"></span>
				</div>
				<div class="game-stat">
					<label>Times Played:</label>
					<span id="modal-played"></span>
				</div>
				<div class="game-stat">
					<label>Last Played:</label>
					<span id="modal-last-played"></span>
				</div>
				<div class="game-stat">
					<label>Total Play Time:</label>
					<span id="modal-playtime"></span>
				</div>
				<div class="modal-buttons">
					<button class="play-btn" id="modal-play-btn">▶️ Play</button>
					<button class="close-modal" id="modal-close-btn">Close</button>
				</div>
			</div>
		</div>

		<script>
			// ===================== Account System =====================
		const AccountManager = {
			getAllUsers: () => {
				return JSON.parse(localStorage.getItem('mathline_users') || '{}');
			},

			saveUsers: (users) => {
				localStorage.setItem('mathline_users', JSON.stringify(users));
			},

			getCurrentUser: () => {
				return localStorage.getItem('mathline_current_user');
			},

			setCurrentUser: (username) => {
				localStorage.setItem('mathline_current_user', username);
			},

			userExists: (username) => {
				const users = AccountManager.getAllUsers();
				return username in users;
			},

			createUser: (username, password) => {
				if(AccountManager.userExists(username)) {
					return { success: false, error: 'Username already exists' };
				}
				if(username.length < 3 || password.length < 3) {
					return { success: false, error: 'Username and password must be 3+ characters' };
				}

				const users = AccountManager.getAllUsers();
				users[username] = {
					password: btoa(password), // Simple encoding (not secure for production)
					totalPlayTime: 0,
					gamesPlayed: {},
					createdAt: new Date().toLocaleDateString()
				};
				AccountManager.saveUsers(users);
				return { success: true };
			},

			login: (username, password) => {
				const users = AccountManager.getAllUsers();
				if(!(username in users)) {
					return { success: false, error: 'User not found' };
				}
				if(users[username].password !== btoa(password)) {
					return { success: false, error: 'Incorrect password' };
				}

				AccountManager.setCurrentUser(username);
				return { success: true };
			},

			logout: () => {
				localStorage.removeItem('mathline_current_user');
			},

			updatePlayTime: (username, playtime) => {
				const users = AccountManager.getAllUsers();
				if(username in users) {
					users[username].totalPlayTime = (users[username].totalPlayTime || 0) + playtime;
					AccountManager.saveUsers(users);
				}
			},

			getLeaderboard: () => {
				const users = AccountManager.getAllUsers();
				return Object.keys(users)
					.map(username => ({
						username,
						totalPlayTime: users[username].totalPlayTime || 0
					}))
					.sort((a, b) => b.totalPlayTime - a.totalPlayTime)
					.slice(0, 50);
			}
		};

		// ===================== Auth UI =====================
		const AuthUI = {
			isLoginMode: true,

			init: () => {
				const currentUser = AccountManager.getCurrentUser();
				if(currentUser) {
					AuthUI.showMainUI(currentUser);
				} else {
					AuthUI.showAuthUI();
				}
			},

			showAuthUI: () => {
				document.getElementById('auth-modal').classList.remove('hidden');
				document.getElementById('user-panel').style.display = 'none';
			},

			showMainUI: (username) => {
				document.getElementById('auth-modal').classList.add('hidden');
				document.getElementById('user-panel').style.display = 'block';
				document.getElementById('user-display').textContent = `👤 ${username}`;
			},

			toggleMode: () => {
				AuthUI.isLoginMode = !AuthUI.isLoginMode;
				const title = document.getElementById('auth-title');
				const button = document.getElementById('auth-submit');
				const toggle = document.getElementById('auth-toggle');

				if(AuthUI.isLoginMode) {
					title.textContent = 'Login';
					button.textContent = 'Login';
					toggle.textContent = "Don't have an account? Create one";
				} else {
					title.textContent = 'Create Account';
					button.textContent = 'Create Account';
					toggle.textContent = 'Already have an account? Login';
				}
				document.getElementById('auth-message').innerHTML = '';
			},

			submit: () => {
				const username = document.getElementById('auth-username').value;
				const password = document.getElementById('auth-password').value;
				const messageEl = document.getElementById('auth-message');

				if(!username || !password) {
					messageEl.innerHTML = '<div class="auth-error">Please fill in all fields</div>';
					return;
				}

				let result;
				if(AuthUI.isLoginMode) {
					result = AccountManager.login(username, password);
				} else {
					result = AccountManager.createUser(username, password);
				}

				if(result.success) {
					messageEl.innerHTML = '<div class="auth-success">Success!</div>';
					setTimeout(() => {
						document.getElementById('auth-username').value = '';
						document.getElementById('auth-password').value = '';
						AuthUI.showMainUI(username);
						renderGames();
					}, 500);
				} else {
					messageEl.innerHTML = `<div class="auth-error">${result.error}</div>`;
				}
			}
		};

		// Event listeners for auth
		document.getElementById('auth-submit').addEventListener('click', AuthUI.submit);
		document.getElementById('auth-toggle').addEventListener('click', AuthUI.toggleMode);
		document.getElementById('logout-btn').addEventListener('click', () => {
			AccountManager.logout();
			AuthUI.showAuthUI();
			document.getElementById('auth-username').value = '';
			document.getElementById('auth-password').value = '';
		});

		// ===================== Leaderboard =====================
		document.getElementById('leaderboard-btn').addEventListener('click', () => {

		function resizeCanvas() {
			canvas.width = window.innerWidth;
			canvas.height = window.innerHeight;
		}
		resizeCanvas();
		window.addEventListener('resize', resizeCanvas);

		let time = 0;
		const gridSpacing = 40;

		function animateGrid() {
			time += 0.8;
			
			ctx.fillStyle = '#000';
			ctx.fillRect(0, 0, canvas.width, canvas.height);

			const colorCycle = (time / 200) % 3;
			let color;
			if(colorCycle < 1) {
				color = `rgba(200, 100, 255, ${0.5 + colorCycle * 0.3})`;
			} else if(colorCycle < 2) {
				color = `rgba(0, 255, 255, ${0.8 - (colorCycle - 1) * 0.3})`;
			} else {
				color = `rgba(255, 50, 200, ${0.5 + (colorCycle - 2) * 0.3})`;
			}

			ctx.strokeStyle = color;
			ctx.lineWidth = 2.5;
			ctx.shadowColor = color;
			ctx.shadowBlur = 15;

			for (let x = 0; x < canvas.width + gridSpacing; x += gridSpacing) {
				const offset = (time * 2) % gridSpacing;
				ctx.beginPath();
				ctx.moveTo(x - offset, 0);
				ctx.lineTo(x - offset + canvas.height * 0.4, canvas.height);
				ctx.stroke();
			}

			for (let y = 0; y < canvas.height + gridSpacing; y += gridSpacing) {
				const offset = (time * 2) % gridSpacing;
				ctx.beginPath();
				ctx.moveTo(0, y - offset);
				ctx.lineTo(canvas.width, y - offset + canvas.width * 0.2);
				ctx.stroke();
			}

			ctx.shadowBlur = 0;

			requestAnimationFrame(animateGrid);
		}

				const lastPlayed = stats.lastPlayed || "Never";
				const roundedTime = parseFloat((stats.playTime || 0).toFixed(2));

				const playTimeStr = roundedTime > 60

					: `${roundedTime}m`;

				document.getElementById('modal-game-name').textContent = gameName;
				document.getElementById('modal-category').textContent = game.category;
				document.getElementById('modal-played').textContent = stats.played || '0';
				document.getElementById('modal-last-played').textContent = lastPlayed;

			if(e.key === 'Escape' && iframe.style.display === 'block') {

			if(e.key === 'f' || e.key === 'F') {
				if(iframe.style.display === 'block') {

					fullscreenBtn.click();
				}
			}

			if((e.key === 'c' || e.key === 'C') && window.innerWidth <= 720) {
