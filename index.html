<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Math Line</title>
	<style>
		:root {
			--bg1: #000000;
			--bg2: #050505;
			--bg3: #0a0a0f;
			--bg4: #0d001a;
			--accent: #9d4edd;
			--text-color: #ffffff;
			--card-radius: 14px;
		}

		html,
		body {
			margin: 0;
			padding: 0;
			height: 100%;
			font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
			color: var(--text-color);
background: linear-gradient(180deg, #0b2a38, #123f52);
			overflow-x: hidden;
			position: relative;
		}

		#grid-bg {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: 1;
			pointer-events: none;
		}

		header {
			padding: 20px;
			text-align: center;
			position: relative;
			z-index: 5;
		}

		header h1 {
			margin: 0;
			font-size: 2.6rem;
			color: #00f5ff;
			text-shadow: 0 0 10px #00f5ff, 0 0 25px #00f5ff;
		}

		#search-input {
			background: rgba(20, 77, 20, 0.6);
			color: var(--text-color);
			width: 100%;
			max-width: 520px;
			padding: 8px 12px;
			font-size: 15px;
			border-radius: 8px;
			border: 2px solid rgba(255, 255, 255, 0.06);
			outline: none;
			box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
		}

		.top-controls {
			display: flex;
			justify-content: center;
			padding: 0 12px;
			z-index: 5;
			flex-wrap: wrap;
			gap: 10px;
			position: relative;
		}

		.category-bar {
			text-align: center;
			margin: 6px 0 12px;
			z-index: 5;
			display: flex;
			justify-content: center;
			flex-wrap: wrap;
			padding: 0 12px;
			gap: 8px;
			position: relative;
		}

		.category-bar button {
			margin: 4px 6px;
			padding: 6px 12px;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			background: var(--accent);
			color: #fff;
			font-weight: 700;
			transition: transform .12s, filter .12s;
		}

		.category-bar button:hover {
			filter: brightness(1.05);
			transform: translateY(-2px);
		}

		.category-bar button.active {
			outline: 3px solid rgba(255, 255, 255, 0.06);
			background: #ff00ff;
		}

		.category-bar button.new-btn {
			background: #ffa500;
		}

		.category-bar button.new-btn.active {
			background: #ff8c00;
			outline: 3px solid rgba(255, 255, 255, 0.06);
		}

		.game-counter {
			text-align: center;
			color: var(--accent);
			margin: 8px 0;
			font-size: 14px;
			font-weight: 700;
			position: relative;
			z-index: 5;
		}

		#game-list {
			display: grid;
			grid-template-columns: repeat(5, minmax(120px, 1fr));
			gap: 30px;
			padding: 18px;
			position: relative;
			z-index: 5;
			row-gap: 60px;
		}

		.game-card {
			width: 80%;
			aspect-ratio: 1/1;
			display: flex;
			align-items: center;
			justify-content: center;
			flex-direction: column;
			background: rgba(15, 0, 30, 0.85);
			border-radius: var(--card-radius);
			cursor: pointer;
			font-weight: 700;
			text-align: center;
			padding: 5px;
			user-select: none;
			border: 2px solid #c77dff;
			color: #c77dff;
			box-shadow: 0 0 10px #c77dff, 0 0 20px #9d4edd, 0 0 40px #7b2cbf;
			transition: all 0.3s ease;
			position: relative;
			font-size: 15px;
		}

		.game-card:hover {
			color: #ffffff;
			border-color: #ff00ff;
			box-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff, 0 0 60px #ff00ff;
			transform: translateY(-4px) scale(1.02);
		}

		.game-card.request {
			box-shadow: 0 0 20px 4px var(--accent);
		}

		#game-frame {
			display: none;
			width: 95%;
			max-width: 1200px;
			height: 680px;
			margin: 12px auto;
			border: none;
			border-radius: 12px;
			background: #000;
			position: relative;
			z-index: 6;
			box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
		}

		#game-loading {
			display: none;
			text-align: center;
			padding: 20px;
			color: var(--accent);
			z-index: 6;
			position: relative;
		}

		.spinner {
			border: 4px solid rgba(157, 78, 221, 0.3);
			border-top: 4px solid #9d4edd;
			border-radius: 50%;
			width: 40px;
			height: 40px;
			animation: spin 1s linear infinite;
			margin: 0 auto 10px;
		}

		@keyframes spin {
			0% {
				transform: rotate(0deg);
			}

			100% {
				transform: rotate(360deg);
			}
		}

		#fullscreen-btn {
			position: fixed;
			right: 18px;
			top: 18px;
			padding: 8px 12px;
			border-radius: 8px;
			border: none;
			cursor: pointer;
			z-index: 12;
			font-weight: 700;
			background: var(--accent);
			color: #fff;
			display: none;
			box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
		}

		#back-btn {
			position: fixed;
			left: 18px;
			top: 18px;
			padding: 8px 12px;
			border-radius: 8px;
			border: none;
			cursor: pointer;
			z-index: 12;
			font-weight: 700;
			background: rgba(0, 0, 0, 0.55);
			color: #fff;
			display: none;
			box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
		}

		.modal {
			display: none;
			position: fixed;
			z-index: 15;
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			background-color: rgba(0, 0, 0, 0.8);
			backdrop-filter: blur(4px);
		}

		.modal.active {
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.modal-content {
			background: rgba(15, 0, 30, 0.95);
			padding: 30px;
			border-radius: 12px;
			border: 2px solid #c77dff;
			max-width: 500px;
			width: 90%;
			color: var(--text-color);
			box-shadow: 0 0 30px #9d4edd;
		}

		.modal-content h2 {
			margin-top: 0;
			color: #00f5ff;
		}

		.game-stat {
			display: flex;
			justify-content: space-between;
			padding: 8px 0;
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
		}

		.game-stat label {
			color: var(--accent);
			font-weight: 700;
		}

		.modal-buttons {
			display: flex;
			gap: 10px;
			margin-top: 20px;
			justify-content: center;
		}

		.modal-buttons button {
			padding: 8px 16px;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			font-weight: 700;
			transition: all 0.2s;
		}

		.play-btn {
			background: var(--accent);
			color: #fff;
		}

		.play-btn:hover {
			filter: brightness(1.1);
		}

		.close-modal {
			background: rgba(255, 255, 255, 0.1);
			color: var(--text-color);
		}

		.close-modal:hover {
			background: rgba(255, 255, 255, 0.2);
		}

		@media (max-width:720px) {
			header h1 {
				font-size: 2rem;
			}

			#game-list {
				grid-template-columns: repeat(3, 1fr);
				gap: 8px;
			}

			#game-frame {
				height: 480px;
			}

			.category-bar {
				gap: 4px;
				display: none;
			}

			.category-bar.mobile-visible {
				display: flex;
			}
		}
	</style>
</head>

const normalGames = [...games].sort((a, b) => a.name.localeCompare(b.name));
    const NEW_COUNT = 6;
    const newestGames = games.slice(-NEW_COUNT).map(g => g.name);

		const gameListEl = document.getElementById('game-list');
		const iframe = document.getElementById('game-frame');
		const backBtn = document.getElementById('back-btn');
		const fullscreenBtn = document.getElementById('fullscreen-btn');
		const categoryEl = document.getElementById('category-filter');
		const searchInput = document.getElementById('search-input');
		const gameModal = document.getElementById('game-modal');
		const gameCounter = document.getElementById('game-counter');
		const gameLoading = document.getElementById('game-loading');

		const categories = ["All", "New", ...new Set(normalGames.map(g => g.category))].sort((a, b) => {
			if(a === "All") return -1;
			if(b === "New") return 1;
			if(a === "All") return -1;
			if(b === "All") return 1;
			return a.localeCompare(b);
		});

		let activeCategory = StorageManager.getLastCategory();
		let activeSearch = '';

		categories.forEach(cat => {
			const btn = document.createElement('button');
			btn.textContent = cat;
			if(cat === "New") btn.classList.add('new-btn');
			if(cat === activeCategory) btn.classList.add('active');
			btn.addEventListener('click', () => {
				document.querySelectorAll('.category-bar button').forEach(b => b.classList.remove('active'));
				btn.classList.add('active');
				activeCategory = cat;
				StorageManager.setLastCategory(cat);
				renderGames();
			});
			categoryEl.appendChild(btn);
		});

		const ModalManager = {
			open: (gameName) => {
				const game = normalGames.find(g => g.name === gameName);
				if(!game) return;
				const stats = StorageManager.getGameStats(gameName);
				const roundedTime = parseFloat((stats.playTime || 0).toFixed(2));
				const playTimeStr = roundedTime > 60 ? `${Math.floor(roundedTime / 60)}h ${(roundedTime % 60).toFixed(2)}m` : `${roundedTime}m`;
				document.getElementById('modal-game-name').textContent = gameName;
				document.getElementById('modal-category').textContent = game.category;
				document.getElementById('modal-played').textContent = stats.played || '0';
				document.getElementById('modal-last-played').textContent = stats.lastPlayed || 'Never';
				document.getElementById('modal-playtime').textContent = playTimeStr;
				document.getElementById('modal-play-btn').onclick = () => ModalManager.play(gameName);
				gameModal.classList.add('active');
			},
			close: () => gameModal.classList.remove('active'),
			play: (gameName) => {
				const game = normalGames.find(g => g.name === gameName);
				const stats = StorageManager.getGameStats(gameName);
				stats.played = (stats.played || 0) + 1;
				stats.lastPlayed = new Date().toLocaleDateString();
				localStorage.setItem(`mathline_stats_${gameName}`, JSON.stringify(stats));
				gameListEl.style.display = 'none';
				gameLoading.style.display = 'block';
				backBtn.style.display = 'block';
				fullscreenBtn.style.display = 'block';
				gameModal.classList.remove('active');
				setTimeout(() => {
					iframe.src = game.url;
					iframe.style.display = 'block';
					gameLoading.style.display = 'none';
				}, 1500);
			}
		};

		document.getElementById('modal-close-btn').addEventListener('click', ModalManager.close);
		gameModal.addEventListener('click', (e) => {
			if(e.target === gameModal) ModalManager.close();
		});
function renderGames(){
gameListEl.innerHTML = "";
let filtered = normalGames;

// Category filtering
if(activeCategory === "New") {
filtered = filtered.filter(g => newestGames.includes(g.name));
} else if(activeCategory !== "All") {
filtered = filtered.filter(g => g.category === activeCategory);
}

// Search filtering
if(activeSearch) {
filtered = filtered.filter(g => g.name.toLowerCase().includes(activeSearch.toLowerCase()));
}

filtered.forEach(g => {
const card = document.createElement('div');
card.className = 'game-card';
card.innerHTML = `<span>${g.name}</span>`;
card.addEventListener('click', () => ModalManager.open(g.name));
gameListEl.appendChild(card);
});

gameCounter.textContent =
`Showing ${filtered.length} game${filtered.length !== 1 ? 's' : ''}` +
(activeCategory !== 'All' ? ` • ${activeCategory}` : '');
}

		searchInput.addEventListener('input', (e) => {
			activeSearch = e.target.value;
			renderGames();
		});

		document.addEventListener('keydown', (e) => {
			if(e.key === 'Escape' && iframe.style.display === 'block') backBtn.click();
			if((e.key === 'f' || e.key === 'F') && iframe.style.display === 'block') {
				e.preventDefault();
				fullscreenBtn.click();
			}
		});

		backBtn.addEventListener('click', () => {
			iframe.style.display = 'none';
			iframe.src = '';
			gameListEl.style.display = 'grid';
			backBtn.style.display = 'none';
			fullscreenBtn.style.display = 'none';
		});

		fullscreenBtn.addEventListener('click', () => {
			if(iframe.requestFullscreen) iframe.requestFullscreen();
		});

		const canvas = document.getElementById('grid-bg');
		const ctx = canvas.getContext('2d', { alpha: false });
		canvas.width = window.innerWidth;
		canvas.height = window.innerHeight;
		window.addEventListener('resize', () => {
			canvas.width = window.innerWidth;
			canvas.height = window.innerHeight;
		});

		let time = 0;
		const gridSpacing = 60;
		let frameCount = 0;

		function animateGrid() {
			requestAnimationFrame(animateGrid);
			frameCount++;
			if(frameCount % 3 !== 0) return;
			time += 0.5;
			ctx.fillStyle = '#000';
			ctx.fillRect(0, 0, canvas.width, canvas.height);
			const colorCycle = (time / 150) % 3;
			let color;
			if(colorCycle < 1) {
				color = `rgba(200, 100, 255, ${0.2 + colorCycle * 0.15})`;
			} else if(colorCycle < 2) {
				color = `rgba(0, 255, 255, ${0.35 - (colorCycle - 1) * 0.15})`;
			} else {
				color = `rgba(255, 50, 200, ${0.2 + (colorCycle - 2) * 0.15})`;
			}
			ctx.strokeStyle = color;
			ctx.lineWidth = 1.2;
			ctx.shadowColor = color;
			ctx.shadowBlur = 4;
			const offset = (time * 1.5) % gridSpacing;
			for (let x = -offset; x < canvas.width + gridSpacing; x += gridSpacing) {
				ctx.beginPath();
				ctx.moveTo(x, 0);
				ctx.lineTo(x + canvas.height * 0.15, canvas.height);
				ctx.stroke();
			}
			for (let y = -offset; y < canvas.height + gridSpacing; y += gridSpacing) {
				ctx.beginPath();
				ctx.moveTo(0, y);
				ctx.lineTo(canvas.width, y + canvas.width * 0.08);
				ctx.stroke();
			}
			ctx.shadowBlur = 0;
		}
		animateGrid();

		renderGames();
		</script>
</body>
