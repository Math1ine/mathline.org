<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Math Line</title>
	<style>
		:root {
			--bg1: #000000;
			--bg2: #050505;
			--bg3: #0a0a0f;
			--bg4: #0d001a;
			--accent: #9d4edd;
			--text-color: #ffffff;
			--card-radius: 14px;
		}

		html,
		body {
			margin: 0;
			padding: 0;
			height: 100%;
			font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
			color: var(--text-color);
			background: #000;
			overflow-x: hidden;
			position: relative;
		}

		#grid-bg {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: 1;
			pointer-events: none;
		}

		header {
			padding: 20px;
			text-align: center;
			position: relative;
			z-index: 5;
		}

		header h1 {
			margin: 0;
			font-size: 2.6rem;
			color: #00f5ff;
			text-shadow: 0 0 10px #00f5ff, 0 0 25px #00f5ff;
		}

		#user-panel {
			position: fixed;
			top: 10px;
			right: 10px;
			background: rgba(157, 78, 221, 0.2);
			border: 2px solid #9d4edd;
			border-radius: 8px;
			padding: 12px 16px;
			z-index: 100;
			font-size: 12px;
			display: flex;
			align-items: center;
			gap: 10px;
		}

		#user-display {
			font-weight: 700;
		}

		#user-display.admin {
			color: #ffd700;
			text-shadow: 0 0 10px #ffd700;
		}

		#user-panel button {
			background: #9d4edd;
			border: none;
			color: #fff;
			padding: 6px 12px;
			border-radius: 4px;
			cursor: pointer;
			font-weight: 700;
			transition: all 0.3s;
			white-space: nowrap;
		}

		#user-panel button:hover {
			background: #c77dff;
		}

		#auth-modal {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.9);
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 25;
		}

		#auth-modal.hidden {
			display: none;
		}

		.auth-container {
			background: rgba(15, 0, 30, 0.95);
			padding: 40px;
			border-radius: 12px;
			border: 2px solid #c77dff;
			max-width: 400px;
			width: 90%;
			box-shadow: 0 0 30px #9d4edd;
		}

		.auth-container h1 {
			color: #00f5ff;
			text-align: center;
			margin-bottom: 30px;
		}

		.auth-input {
			width: 100%;
			padding: 12px;
			margin: 12px 0;
			background: rgba(50, 50, 70, 0.8);
			border: 2px solid rgba(157, 78, 221, 0.3);
			border-radius: 6px;
			color: var(--text-color);
			font-size: 14px;
			box-sizing: border-box;
			transition: all 0.3s;
		}

		.auth-input:focus {
			outline: none;
			border-color: #9d4edd;
			background: rgba(50, 50, 70, 1);
			box-shadow: 0 0 10px rgba(157, 78, 221, 0.3);
		}

		.auth-button {
			width: 100%;
			padding: 12px;
			margin: 12px 0;
			background: #9d4edd;
			border: none;
			border-radius: 6px;
			color: #fff;
			font-weight: 700;
			cursor: pointer;
			transition: all 0.3s;
		}

		.auth-button:hover {
			background: #c77dff;
			box-shadow: 0 0 15px rgba(157, 78, 221, 0.5);
		}

		.auth-toggle {
			text-align: center;
			margin-top: 15px;
			color: #9d4edd;
			cursor: pointer;
			font-size: 12px;
		}

		.auth-error {
			color: #ff6b6b;
			text-align: center;
			margin: 10px 0;
			font-size: 12px;
		}

		.auth-success {
			color: #51cf66;
			text-align: center;
			margin: 10px 0;
			font-size: 12px;
		}

		#settings-modal {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.8);
			display: none;
			align-items: center;
			justify-content: center;
			z-index: 24;
			backdrop-filter: blur(4px);
		}

		#settings-modal.show {
			display: flex;
		}

		.settings-container {
			background: rgba(15, 0, 30, 0.95);
			padding: 30px;
			border-radius: 12px;
			border: 2px solid #c77dff;
			max-width: 500px;
			width: 90%;
			max-height: 80vh;
			overflow-y: auto;
			box-shadow: 0 0 30px #9d4edd;
		}

		.settings-container h2 {
			color: #00f5ff;
			text-align: center;
			margin-top: 0;
		}

		.settings-item {
			margin: 20px 0;
			padding: 15px;
			background: rgba(157, 78, 221, 0.1);
			border-radius: 8px;
			border: 1px solid rgba(157, 78, 221, 0.3);
		}

		.settings-item label {
			display: block;
			color: var(--accent);
			font-weight: 700;
			margin-bottom: 8px;
		}

		.color-picker {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
		}

		.color-option {
			width: 40px;
			height: 40px;
			border-radius: 50%;
			cursor: pointer;
			border: 3px solid transparent;
			transition: all 0.3s;
		}

		.color-option.selected {
			border-color: #fff;
			box-shadow: 0 0 10px currentColor;
		}

		#admin-modal {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.8);
			display: none;
			align-items: center;
			justify-content: center;
			z-index: 23;
			backdrop-filter: blur(4px);
		}

		#admin-modal.show {
			display: flex;
		}

		.admin-container {
			background: rgba(15, 0, 30, 0.95);
			padding: 30px;
			border-radius: 12px;
			border: 2px solid #ff6b6b;
			max-width: 600px;
			width: 90%;
			max-height: 80vh;
			overflow-y: auto;
			box-shadow: 0 0 30px #ff6b6b;
		}

		.admin-container h2 {
			color: #ff6b6b;
			text-align: center;
			margin-top: 0;
		}

		.admin-player {
			display: grid;
			grid-template-columns: 1fr auto;
			align-items: center;
			padding: 12px;
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
			gap: 15px;
		}

		.admin-player.banned {
			background: rgba(255, 107, 107, 0.1);
			opacity: 0.6;
		}

		.admin-player-name {
			color: #00f5ff;
			font-weight: 700;
		}

		.admin-player.banned .admin-player-name {
			text-decoration: line-through;
			color: #ff6b6b;
		}

		.admin-actions {
			display: flex;
			gap: 5px;
		}

		.admin-actions button {
			background: #ff6b6b;
			border: none;
			color: #fff;
			padding: 6px 10px;
			border-radius: 4px;
			cursor: pointer;
			font-weight: 700;
			transition: all 0.3s;
			font-size: 11px;
		}

		.admin-actions button:hover {
			background: #ff8787;
		}

		.admin-actions button.unban {
			background: #51cf66;
		}

		.admin-actions button.unban:hover {
			background: #69db7c;
		}

		.popular-game {
			display: flex;
			align-items: center;
			gap: 15px;
			padding: 12px;
			background: rgba(157, 78, 221, 0.1);
			border-radius: 8px;
			margin-bottom: 10px;
			border-left: 4px solid #ffd700;
		}

		.popular-game-rank {
			font-size: 24px;
			font-weight: 700;
			color: #ffd700;
			min-width: 40px;
		}

		.popular-game-info {
			flex: 1;
		}

		.popular-game-name {
			color: #00f5ff;
			font-weight: 700;
		}

		.popular-game-plays {
			color: #9d4edd;
			font-size: 12px;
		}

		#leaderboard-modal {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.8);
			display: none;
			align-items: center;
			justify-content: center;
			z-index: 22;
			backdrop-filter: blur(4px);
		}

		#leaderboard-modal.show {
			display: flex;
		}

		.leaderboard-container {
			background: rgba(15, 0, 30, 0.95);
			padding: 30px;
			border-radius: 12px;
			border: 2px solid #c77dff;
			max-width: 600px;
			width: 90%;
			max-height: 80vh;
			overflow-y: auto;
			box-shadow: 0 0 30px #9d4edd;
		}

		.leaderboard-container h2 {
			color: #00f5ff;
			text-align: center;
			margin-top: 0;
		}

		.leaderboard-row {
			display: grid;
			grid-template-columns: 50px 1fr 150px;
			align-items: center;
			padding: 12px;
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
			gap: 15px;
		}

		.leaderboard-row.header {
			background: rgba(157, 78, 221, 0.2);
			font-weight: 700;
			border-bottom: 2px solid #9d4edd;
		}

		.leaderboard-rank {
			text-align: center;
			color: #9d4edd;
			font-weight: 700;
		}

		.leaderboard-rank.first {
			color: #ffd700;
		}

		.leaderboard-rank.second {
			color: #c0c0c0;
		}

		.leaderboard-rank.third {
			color: #cd7f32;
		}

		.leaderboard-name {
			color: #00f5ff;
			font-weight: 700;
		}

		.leaderboard-playtime {
			text-align: right;
			color: #c77dff;
		}

		.close-leaderboard {
			background: rgba(255, 255, 255, 0.1) !important;
			margin-top: 15px;
			width: 100%;
		}

		.top-controls {
			display: flex;
			justify-content: center;
			padding: 0 12px;
			z-index: 5;
			flex-wrap: wrap;
			gap: 10px;
			position: relative;
		}

		#search-input {
			background: rgba(20, 77, 20, 0.6);
			color: var(--text-color);
			width: 100%;
			max-width: 520px;
			padding: 8px 12px;
			font-size: 15px;
			border-radius: 8px;
			border: 2px solid rgba(255, 255, 255, 0.06);
			outline: none;
			box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
		}

		.category-bar {
			text-align: center;
			margin: 6px 0 12px;
			z-index: 5;
			display: flex;
			justify-content: center;
			flex-wrap: wrap;
			padding: 0 12px;
			gap: 8px;
			position: relative;
		}

		.category-bar button {
			margin: 4px 6px;
			padding: 6px 12px;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			background: var(--accent);
			color: #fff;
			font-weight: 700;
			transition: transform .12s, filter .12s;
		}

		.category-bar button:hover {
			filter: brightness(1.05);
			transform: translateY(-2px);
		}

		.category-bar button.active {
			outline: 3px solid rgba(255, 255, 255, 0.06);
			background: #ff00ff;
		}

		.game-counter {
			text-align: center;
			color: var(--accent);
			margin: 8px 0;
			font-size: 14px;
			font-weight: 700;
			position: relative;
			z-index: 5;
		}

#game-list {
display: grid;
grid-template-columns: repeat(5, minmax(120px, 1fr));
gap: 30px;
padding: 18px;
position: relative;
z-index: 5;
row-gap: 60px;
}

.game-card {
width: 80%;
aspect-ratio: 1/1;
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
background: rgba(15, 0, 30, 0.85);
border-radius: var(--card-radius);
cursor: pointer;
font-weight: 700;
text-align: center;
padding: 5px;
user-select: none;
border: 2px solid #c77dff;
color: #c77dff;
box-shadow: 0 0 10px #c77dff, 0 0 20px #9d4edd, 0 0 40px #7b2cbf;
transition: all 0.3s ease;
position: relative;
font-size: 15px;
}

.game-card:hover {
color: #ffffff;
border-color: #ff00ff;
box-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff, 0 0 60px #ff00ff;
transform: translateY(-4px) scale(1.02);
}

.game-card.request {
box-shadow: 0 0 20px 4px var(--accent);
}

		#game-frame {
			display: none;
			width: 95%;
			max-width: 1100px;
			height: 680px;
			margin: 12px auto;
			border: none;
			border-radius: 12px;
			background: #000;
			position: relative;
			z-index: 6;
			box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
		}

		#game-loading {
			display: none;
			text-align: center;
			padding: 20px;
			color: var(--accent);
			z-index: 6;
			position: relative;
		}

		.spinner {
			border: 4px solid rgba(157, 78, 221, 0.3);
			border-top: 4px solid #9d4edd;
			border-radius: 50%;
			width: 40px;
			height: 40px;
			animation: spin 1s linear infinite;
			margin: 0 auto 10px;
		}

		@keyframes spin {
			0% {
				transform: rotate(0deg);
			}

			100% {
				transform: rotate(360deg);
			}
		}

		.floating-btn {
			position: fixed;
			padding: 8px 12px;
			border-radius: 8px;
			border: none;
			cursor: pointer;
			z-index: 12;
			font-weight: 700;
			box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
		}

		#fullscreen-btn {
			right: 18px;
			top: 18px;
			background: var(--accent);
			color: #fff;
			display: none;
		}

		#back-btn {
			left: 18px;
			top: 18px;
			background: rgba(0, 0, 0, 0.55);
			color: #fff;
			display: none;
		}

		.modal {
			display: none;
			position: fixed;
			z-index: 15;
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			background-color: rgba(0, 0, 0, 0.8);
			backdrop-filter: blur(4px);
		}

		.modal.active {
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.modal-content {
			background: rgba(15, 0, 30, 0.95);
			padding: 30px;
			border-radius: 12px;
			border: 2px solid #c77dff;
			max-width: 500px;
			width: 90%;
			color: var(--text-color);
			box-shadow: 0 0 30px #9d4edd;
		}

		.modal-content h2 {
			margin-top: 0;
			color: #00f5ff;
		}

		.game-stat {
			display: flex;
			justify-content: space-between;
			padding: 8px 0;
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
		}

		.game-stat label {
			color: var(--accent);
			font-weight: 700;
		}

		.modal-buttons {
			display: flex;
			gap: 10px;
			margin-top: 20px;
			justify-content: center;
		}

		.modal-buttons button {
			padding: 8px 16px;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			font-weight: 700;
			transition: all 0.2s;
		}

		.play-btn {
			background: var(--accent);
			color: #fff;
		}

		.play-btn:hover {
			filter: brightness(1.1);
		}

		.close-modal {
			background: rgba(255, 255, 255, 0.1);
			color: var(--text-color);
		}

		.close-modal:hover {
			background: rgba(255, 255, 255, 0.2);
		}

		@media (max-width:520px) {
			header h1 {
				font-size: 2rem;
			}

			#user-panel {
				position: relative;
				right: auto;
				top: auto;
				width: auto;
				margin-top: 10px;
			}

			#game-list {
				grid-template-columns: repeat(3, 1fr);
				gap: 50px;
			}

			#game-frame {
				height: 10px;
			}

			.category-bar {
				gap: 1px;
				display: none;
			}

			.category-bar.mobile-visible {
				display: flex;
			}
		}
	</style>
</head>

<body>
	<canvas id="grid-bg"></canvas>

	<div id="auth-modal">
		<div class="auth-container">
			<h1 id="auth-title">Login</h1>
			<div id="auth-message"></div>
			<input type="text" id="auth-username" class="auth-input" placeholder="Username" maxlength="20">
			<input type="password" id="auth-password" class="auth-input" placeholder="Password" maxlength="30">
			<button class="auth-button" id="auth-submit">Login</button>
			<div class="auth-toggle" id="auth-toggle">Don't have an account? Create one</div>
		</div>
	</div>

	<div id="settings-modal">
		<div class="settings-container">
			<h2>⚙️ Profile Settings</h2>
			<div class="settings-item">
				<label>Your Name Color</label>
				<div class="color-picker" id="color-picker">
					<div class="color-option" style="background-color: #00f5ff;" data-color="#00f5ff" title="Cyan">
					</div>
					<div class="color-option" style="background-color: #ffd700;" data-color="#ffd700" title="Golden">
					</div>
					<div class="color-option" style="background-color: #ff00ff;" data-color="#ff00ff" title="Magenta">
					</div>
					<div class="color-option" style="background-color: #51cf66;" data-color="#51cf66" title="Green">
					</div>
					<div class="color-option" style="background-color: #ff6b6b;" data-color="#ff6b6b" title="Red"></div>
					<div class="color-option" style="background-color: #ffa500;" data-color="#ffa500" title="Orange">
					</div>
					<div class="color-option" style="background-color: #c77dff;" data-color="#c77dff" title="Purple">
					</div>
					<div class="color-option" style="background-color: #ffffff;" data-color="#ffffff" title="White">
					</div>
				</div>
			</div>
			<button class="auth-button" id="save-settings">Save Settings</button>
			<button class="close-modal" id="close-settings" style="width: 100%; margin-top: 10px;">Close</button>
		</div>
	</div>

	<div id="admin-modal">
		<div class="admin-container">
			<h2>👑 Admin Panel</h2>
			<div id="admin-players-list"></div>
			<button class="close-modal" id="close-admin" style="width: 100%; margin-top: 15px;">Close</button>
		</div>
	</div>

	<div id="leaderboard-modal">
		<div class="leaderboard-container">
			<h2>🏆 Leaderboard</h2>
			<div class="leaderboard-row header">
				<div class="leaderboard-rank">Rank</div>
				<div class="leaderboard-name">Player</div>
				<div class="leaderboard-playtime">Total Playtime</div>
			</div>
			<div id="leaderboard-list"></div>
			<button class="auth-button close-leaderboard" id="close-leaderboard">Close</button>
		</div>
	</div>

	<div id="user-panel" style="display: none;">
		<span id="user-display"></span>
		<button id="leaderboard-btn">🏆</button>
		<button id="settings-btn">⚙️</button>
		<button id="admin-btn" style="display: none;">👑</button>
		<button id="logout-btn">🚪</button>
	</div>

	<header>
		<h1>Math Line</h1>
	</header>

	<div class="top-controls">
		<input id="search-input" type="search" placeholder="Search games" aria-label="Search games">
	</div>

		<div class="category-bar" id="category-filter"></div>
		<div class="game-counter" id="game-counter"></div>
		<div id="game-list" aria-live="polite"></div>

		<div id="game-loading">
			<div class="spinner"></div>
			<p>Loading game...</p>
		</div>

		<iframe id="game-frame" title="Game frame" sandbox="allow-scripts allow-same-origin"></iframe>

		<button id="fullscreen-btn" class="floating-btn" title="Enter fullscreen (F)">⛶ Fullscreen</button>
		<button id="back-btn" class="floating-btn" title="Back to games (Esc)">← Back</button>

		<div id="game-modal" class="modal">
			<div class="modal-content">
				<h2 id="modal-game-name"></h2>
				<div class="game-stat">
					<label>Category:</label>
					<span id="modal-category"></span>
				</div>
				<div class="game-stat">
					<label>Times Played:</label>
					<span id="modal-played"></span>
				</div>
				<div class="game-stat">
					<label>Last Played:</label>
					<span id="modal-last-played"></span>
				</div>

		function isNameClean(username) {
			const lowerName = username.toLowerCase();
			for(let word of BANNED_WORDS) {
				if(lowerName.includes(word)) return false;
			}
			return true;

		const BanManager = {
			getBannedUsers: () => JSON.parse(localStorage.getItem('mathline_banned_users') || '[]'),
			saveBannedUsers: (banned) => localStorage.setItem('mathline_banned_users', JSON.stringify(banned)),
			isBanned: (username) => BanManager.getBannedUsers().includes(username),
			banUser: (username) => {
				const banned = BanManager.getBannedUsers();
				if(!banned.includes(username)) {
					banned.push(username);
					BanManager.saveBannedUsers(banned);
				}
			},
			unbanUser: (username) => {
				const banned = BanManager.getBannedUsers();
				BanManager.saveBannedUsers(banned.filter(u => u !== username));
			}
		};

			getUserData: (username) => JSON.parse(localStorage.getItem(`mathline_user_${username}`) || '{"nameColor":"#00f5ff"}'),
			setUserData: (username, data) => localStorage.setItem(`mathline_user_${username}`, JSON.stringify(data)),
			getAllUsers: () => JSON.parse(localStorage.getItem('mathline_all_users') || '{}'),
			saveUsers: (users) => localStorage.setItem('mathline_all_users', JSON.stringify(users)),

			createUser: (username, password) => {
				if(!isNameClean(username)) return { success: false, error: 'Username contains inappropriate language' };
				if(username.length < 3 || password.length < 3) return { success: false, error: 'Username and password must be 3+ characters' };
				if(!/^[a-zA-Z0-9_]+$/.test(username)) return { success: false, error: 'Username can only contain letters, numbers, and underscores' };

				const users = AccountManager.getAllUsers();
				if(username in users) return { success: false, error: 'Username already exists' };

				users[username] = { password: btoa(password), totalPlayTime: 0, createdAt: new Date().toLocaleDateString() };
				AccountManager.saveUsers(users);
				AccountManager.setCurrentUser(username);
				AccountManager.setUserData(username, { nameColor: '#00f5ff' });
				return { success: true };
			},

			login: (username, password) => {
				if(BanManager.isBanned(username)) return { success: false, error: 'This account has been banned' };
				const users = AccountManager.getAllUsers();
				if(!(username in users)) return { success: false, error: 'User not found' };
				if(users[username].password !== btoa(password)) return { success: false, error: 'Incorrect password' };
				AccountManager.setCurrentUser(username);
				return { success: true };
			},

			logout: () => { localStorage.removeItem('mathline_current_user'); },

			updatePlayTime: (username, playtime) => {

				if(username in users) {

					.slice(0, 50);
			}

		let time = 0;
		const gridSpacing = 60;
		let frameCount = 0;

		function animateGrid() {
			requestAnimationFrame(animateGrid);
			frameCount++;
			if(frameCount % 3 !== 0) return;
			time += 0.5;
			ctx.fillStyle = '#000';
			ctx.fillRect(0, 0, canvas.width, canvas.height);
			const colorCycle = (time / 150) % 3;
			let color;
			if(colorCycle < 1) {
				color = `rgba(200, 100, 255, ${0.2 + colorCycle * 0.15})`;
			} else if(colorCycle < 2) {
				color = `rgba(0, 255, 255, ${0.35 - (colorCycle - 1) * 0.15})`;
			} else {
				color = `rgba(255, 50, 200, ${0.2 + (colorCycle - 2) * 0.15})`;
			}
			ctx.strokeStyle = color;
			ctx.lineWidth = 1.2;
			ctx.shadowColor = color;
			ctx.shadowBlur = 4;
			const offset = (time * 1.5) % gridSpacing;
			for (let x = -offset; x < canvas.width + gridSpacing; x += gridSpacing) {
				ctx.beginPath();
				ctx.moveTo(x, 0);
				ctx.lineTo(x + canvas.height * 0.15, canvas.height);
				ctx.stroke();
			}
			for (let y = -offset; y < canvas.height + gridSpacing; y += gridSpacing) {
				ctx.beginPath();
				ctx.moveTo(0, y);
				ctx.lineTo(canvas.width, y + canvas.width * 0.08);
				ctx.stroke();
			}

		}

				document.getElementById('modal-game-name').textContent = gameName;
				document.getElementById('modal-category').textContent = game.category;
				document.getElementById('modal-played').textContent = stats.played || '0';
				document.getElementById('modal-last-played').textContent = stats.lastPlayed || 'Never';
				document.getElementById('modal-playtime').textContent = playTimeStr;
				document.getElementById('modal-play-btn').onclick = () => ModalManager.play(gameName);
				gameModal.classList.add('active');
			},
			close: () => gameModal.classList.remove('active'),
			play: (gameName) => {
				const game = normalGames.find(g => g.name === gameName);
				const stats = StorageManager.getGameStats(gameName);
				stats.played = (stats.played || 0) + 1;
				stats.lastPlayed = new Date().toLocaleDateString();
				localStorage.setItem(`mathline_stats_${gameName}`, JSON.stringify(stats));
				playTimer = setInterval(() => StorageManager.updateGameStats(gameName), 1000);
				gameListEl.style.display = 'none';
				gameLoading.style.display = 'block';
				backBtn.style.display = 'block';
				fullscreenBtn.style.display = 'block';
				gameModal.classList.remove('active');
				setTimeout(() => {
					iframe.src = game.url;
					iframe.style.display = 'block';
					gameLoading.style.display = 'none';
				}, 1500);
			}
		};

		document.getElementById('modal-close-btn').addEventListener('click', ModalManager.close);
		gameModal.addEventListener('click', (e) => {
			if(e.target === gameModal) ModalManager.close();
		});

		function renderGames(){
			gameListEl.innerHTML = "";
			let filtered = normalGames;
			if(activeCategory !== "All") filtered = filtered.filter(g => g.category === activeCategory);
			if(activeSearch) filtered = filtered.filter(g => g.name.toLowerCase().includes(activeSearch.toLowerCase()));
			filtered.forEach(g => {
				const card = document.createElement('div');
				card.className = 'game-card';
				card.innerHTML = `<span>${g.name}</span>`;
				card.addEventListener('click', () => ModalManager.open(g.name));
				gameListEl.appendChild(card);
			});
			const reqCard = document.createElement('div');
			reqCard.className = 'game-card request';
			reqCard.innerHTML = '<span>Request a Game</s#game-list pan>';
			reqCard.addEventListener('click', () => window.open('https://docs.google.com/forms/d/e/1FAIpQLScGV9D3vWWpSj7nmcbH8segX7uh0K8Cbli50mb9LM5QeoQD_Q/viewform?usp=dialog', '_blank'));
			gameListEl.appendChild(reqCard);
			gameCounter.textContent = `Showing ${filtered.length} game${filtered.length !== 1 ? 's' : ''} ${activeCategory !== 'All' ? `• ${activeCategory}` : ''}`;
		}

		searchInput.addEventListener('input', (e) => {
			activeSearch = e.target.value;
			renderGames();
		});

		document.addEventListener('keydown', (e) => {
			if(e.key === 'Escape' && iframe.style.display === 'block') backBtn.click();
			if((e.key === 'f' || e.key === 'F') && iframe.style.display === 'block') {
				e.preventDefault();
				fullscreenBtn.click();
			}
		});

		backBtn.addEventListener('click', () => {
			if(playTimer) {
				clearInterval(playTimer);
				const currentUser = AccountManager.getCurrentUser();
				if(currentUser) AccountManager.updatePlayTime(currentUser, 1.5);
			}
			iframe.style.display = 'none';
			iframe.src = '';
			gameListEl.style.display = 'grid';
			backBtn.style.display = 'none';
			fullscreenBtn.style.display = 'none';
		});

		fullscreenBtn.addEventListener('click', () => {
			if(iframe.requestFullscreen) iframe.requestFullscreen();
		});

		AuthUI.init();
		</script>
</body>

</html>
